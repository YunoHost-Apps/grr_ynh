packaging_format = 2

id = "grr"
name = "Grr"
description.en = "Tool for booking meeting rooms or other resources"
description.fr = "Outil de réservation de salles de réunion ou d'autres ressources"

version = "4.6.3~ynh1"

maintainers = ["Sébastien Menentrier"]

[upstream]
license = "AGPL-3.0-only"
website = "https://site.devome.com/fr/grr3"
admindoc = "https://site.devome.com/fr/grr/telechargement/category/2-informations-documentations"
userdoc = "https://site.devome.com/fr/grr/telechargement/category/2-informations-documentations"
code = "https://github.com/JeromeDevome/GRR"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/grr"

    [install.admin]
    type = "user"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
        [resources.sources.main]
        url = "https://github.com/JeromeDevome/GRR/archive/refs/tags/v4.6.3.tar.gz"
        sha256 = "173b914158e917019d462ceb6cfe68a2453551f9bcb8618e0354fa44f235ba53"
        autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "mariadb-server, php8.5-ldap, php8.5-gd, php8.5-mbstring, php8.5-mysqli, php8.5-mysqlnd, php8.5-xml, php8.5-intl"

    [resources.database]
    type = "mysql"
